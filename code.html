            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[]|&^%$#@!';
            const fontSize = 10;
            const columns = Math.floor(c.width / fontSize);
            const drops = Array(columns).fill(1);
            function draw() {
                ctx.fillStyle = 'rgba(5, 8, 15, 0.05)';
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = '#00ff41';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 50);
            window.addEventListener('resize', () => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
            });

        // ============== FUNGSI DASAR ==============
        function print(text, type = "success") {
            const div = document.createElement('div');
            div.className = `output ${type}`;
            div.textContent = text;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        /**
         * printCmd — Menampilkan teks perintah yang bisa DI-KLIK.
         */
        function printCmd(text, type = "info") {
            const div = document.createElement('div');
            div.className = `output ${type}`;
            const match = text.match(/^(.*?)(\b[a-z_]\w+\b)(.*)$/i);
            if (match) {
                const before = match[1];
                const cmdName = match[2];
                const after = match[3];
                div.innerHTML = before + `<span class="cmd-clickable" data-cmd="${cmdName}">${cmdName}</span>` + after;
            } else {
                div.textContent = text;
            }
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

         * printPreview — Menampilkan preview/output contoh di dalam kotak border-left.

            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;

        }
        updateClock();
        setInterval(updateClock, 1000);

        // ============== LOADING BAR ==============
        function createLoadingBar(label, subSteps, callback) {
            const section = document.createElement('div');
            section.className = 'loading-section';
            section.innerHTML = `
                <div class="loading-label">${label}</div>
                <div class="loading-bar"><div class="loading-bar-fill" id="loadFill">0%</div></div>
                <div class="loading-sub" id="loadSub">Initializing...</div>
            `;
            terminal.appendChild(section);
            terminal.scrollTop = terminal.scrollHeight;

            let pct = 0;
            let stepIdx = 0;
            const fill = section.querySelector('#loadFill');
            const sub = section.querySelector('#loadSub');

            const interval = setInterval(() => {
                const inc = Math.floor(Math.random() * 7) + 2;
                pct += inc;
                if (pct > 100) pct = 100;

                fill.style.width = pct + '%';
                fill.textContent = pct + '%';

                if (stepIdx < subSteps.length && pct >= (stepIdx + 1) * (100 / subSteps.length)) {
                    sub.textContent = subSteps[stepIdx];
                    stepIdx++;
                }

                if (pct >= 100) {
                    clearInterval(interval);
                    sub.textContent = '[OK] ' + (subSteps[subSteps.length - 1] || 'Complete.');
                    fill.style.background = 'linear-gradient(90deg, #003300, #00ff41)';
                    setTimeout(callback, 300);
                }
            }, 80 + Math.floor(Math.random() * 60));
        }

            switch (normalized) {
                case "help":

                    break;
                case "intel_feed":

                    break;
                case "scan_region":

                    break;
                case "decode_audio":

                case "worm_breach":

                    break;
                case "dossier":

                    break;
                case "project_adam":
                    cmdProjectAdam();
                    break;
                case "orbital_scan":
                    cmdOrbitalScan();
                    break;
                case "darknet_relay":
                    cmdDarknetRelay();
                    break;
                case "wipe_log":
                    cmdWipeLog();
                    break;
                case "abort":
                    cmdAbort();
                    break;
                case "":
                    break;
                default:
                    print(`[ERROR] Perintah tidak dikenal: '${cmd}'. Ketik 'help' untuk daftar perintah.`, "error");
                    break;
            }

            setTimeout(() => {
                terminal.scrollTop = terminal.scrollHeight;
            }, 100);
        }

        // ============== EVENT: INPUT ENTER ==============
        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = commandInput.value.trim();
                commandInput.value = '';
                if (cmd) executeCommand(cmd);
            }
        });

        // ============== EVENT: KLIK PADA COMMAND DI TERMINAL ==============
        terminal.addEventListener('click', (e) => {
            const target = e.target.closest('.cmd-clickable');
            if (target) {
                const cmd = target.getAttribute('data-cmd');
                if (cmd) {
                    commandInput.value = cmd;
                    executeCommand(cmd);
                    commandInput.focus();
                }
            }
        });

            }
            isLiveMode = true;
            isAborted = false;
            print("[LIVE FEED] Feed intelijen global diaktifkan. Menampilkan 19 laporan...", "info");
            print("[LIVE FEED] Tekan 'abort' untuk menghentikan kapan saja.", "dim");

            let idx = 0;
            liveInterval = setInterval(() => {
                if (isAborted || idx >= databaseIntel.length) {
                    clearInterval(liveInterval);
                    liveInterval = null;
                    isLiveMode = false;
                    if (idx >= databaseIntel.length) {
                        print("[LIVE FEED] Semua laporan telah ditampilkan. Feed selesai.", "success");
                    } else {
                        print("[LIVE FEED] Dihentikan oleh user.", "warning");
                    }
                    return;
                }
                print(`[LAPORAN ${idx+1}/${databaseIntel.length}] ${databaseIntel[idx]}`, "live-data");
                idx++;
                terminal.scrollTop = terminal.scrollHeight;
            }, 2000);
        }
