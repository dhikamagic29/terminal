                fill.textContent = pct + '%';
                if (stepIdx < subSteps.length && pct >= (stepIdx + 1) * (100 / subSteps.length)) {
                    sub.textContent = subSteps[stepIdx];
                    stepIdx++;

                if (pct >= 100) {

                    sub.textContent = '[OK] ' + (subSteps[subSteps.length - 1] || 'Complete.');

        // ============== EKSEKUSI PERINTAH ==============
        function executeCommand(cmd) {
            const normalized = cmd.trim().toLowerCase();
            isAborted = false;
            print(`$ ${cmd}`, "command");

            switch (normalized) {
                case "help": cmdHelp(); break;
                case "intel_feed": cmdIntelFeed(); break;
                case "scan_region": cmdScanRegion(); break;
                case "decode_audio": cmdDecodeAudio(); break;
                case "worm_breach": cmdWormBreach(); break;
                case "dossier": cmdDossier(); break;
                case "project_adam": cmdProjectAdam(); break;
                case "orbital_scan": cmdOrbitalScan(); break;
                case "darknet_relay": cmdDarknetRelay(); break;
                case "wipe_log": cmdWipeLog(); break;
                case "abort": cmdAbort(); break;
                case "": break;
                default: print(`[ERROR] Perintah '${cmd}' tidak dikenal. Ketik 'help'.`, "error"); break;
            }

            setTimeout(() => terminal.scrollTop = terminal.scrollHeight, 100);
        }

        // ============== EVENT HANDLER ==============
        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = commandInput.value.trim();
                commandInput.value = '';
                if (cmd) executeCommand(cmd);
            }
        });

        terminal.addEventListener('click', (e) => {
            const target = e.target.closest('.cmd-clickable');
            if (target) {
                const cmd = target.getAttribute('data-cmd');
                if (cmd) {
                    commandInput.value = cmd;
                    executeCommand(cmd);
                    commandInput.focus();
                }
            }
        });
